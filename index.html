<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0805">
<title>Street Lifting — Jeremy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0805;--c1:#131008;--c2:#1c1610;--c3:#252018;--c4:#2e2820;
  --bd:rgba(255,180,80,.07);
  --or:#E8732A;--or2:rgba(232,115,42,.22);--or3:rgba(232,115,42,.1);
  --am:#D4A810;--am2:rgba(212,168,16,.18);
  --gr:#3DBA6F;--gr2:rgba(61,186,111,.16);
  --bl:#4F8EF7;--bl2:rgba(79,142,247,.15);
  --wh:#F5F0E8;--gy:#7A7060;--gy2:#4A4438;
  --r:13px;--r2:9px;
}
html,body{height:100%;background:var(--bg);color:var(--wh);font-family:'Barlow',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{height:100dvh;display:flex;flex-direction:column}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pg{padding:12px 13px 88px}

/* HEADER */
header{background:var(--c1);padding:46px 13px 0;flex-shrink:0}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px}
.hbrand{display:flex;align-items:flex-start;gap:8px}
.bname{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;color:var(--or);letter-spacing:.4px;line-height:1;text-transform:uppercase}
.bsub{font-size:9px;color:var(--gy);letter-spacing:.4px;margin-top:3px}
.hright{display:flex;gap:6px;align-items:center;flex-shrink:0}
.sc{background:var(--c3);border:1px solid var(--bd);border-radius:8px;padding:4px 9px;text-align:center;min-width:48px}
.scl{font-size:8px;color:var(--gy);text-transform:uppercase;letter-spacing:.3px;line-height:1.3}
.scv{font-size:19px;font-weight:900;line-height:1}
.bsw{background:var(--or);border:none;border-radius:8px;padding:8px 11px;display:flex;align-items:center;gap:4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:900;color:#fff;letter-spacing:.3px;text-transform:uppercase;flex-shrink:0}
.bsw:active{opacity:.75}
.hline{height:1.5px;background:var(--or);opacity:.4;margin-top:9px}

/* NAV */
nav{background:var(--c1);border-top:1px solid var(--bd);display:flex;padding-bottom:env(safe-area-inset-bottom,4px);flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px 7px;cursor:pointer;opacity:.28;transition:opacity .15s;border:none;background:none;color:var(--wh);font-family:'Barlow',sans-serif}
.nb.on{opacity:1;color:var(--or)}
.nb svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nb span{font-size:8.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}

/* CARDS */
.card{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:8px}
.card2{background:var(--c2);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:8px}
.card3{background:var(--c3);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:8px}

/* TYPOGRAPHY */
.sl{font-size:9.5px;font-weight:700;color:var(--gy);letter-spacing:.7px;text-transform:uppercase;margin:15px 0 7px}
.bc{font-family:'Barlow Condensed',sans-serif}

/* PBAR */
.pb{height:4px;background:var(--c3);border-radius:2px;overflow:hidden;margin:4px 0}
.pbf{height:100%;border-radius:2px;background:var(--or);transition:width .4s}

/* BUTTONS */
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:14px;font-weight:800;font-family:'Barlow',sans-serif;cursor:pointer;transition:opacity .15s;color:#fff}
.btn:active{opacity:.8}
.bor{background:var(--or)}
.bgr{background:var(--gr);color:#000}
.bdk{background:var(--c2);color:var(--gy);border:1px solid var(--bd)}
.bam{background:var(--am);color:#000}
.bsm{padding:7px 13px;font-size:11px;font-weight:700;border-radius:7px;border:1px solid var(--bd);background:var(--c3);color:var(--gy);cursor:pointer;font-family:'Barlow',sans-serif}
.bsm.on{background:var(--or);border-color:var(--or);color:#fff}
.bsm:active{opacity:.8}

/* INPUTS */
input[type=number],input[type=text],input[type=date],input[type=url]{background:var(--c2);border:1px solid var(--bd);border-radius:8px;color:var(--wh);font-size:14px;font-family:'Barlow',sans-serif;padding:10px 11px;width:100%;outline:none;margin-bottom:8px}
input:focus{border-color:var(--or)}
label{font-size:9.5px;font-weight:700;color:var(--gy);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:block}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}

/* STAT CARDS */
.stc{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r2);padding:10px 8px;text-align:center}
.stv{font-size:26px;font-weight:900;line-height:1}
.stl{font-size:9px;color:var(--gy);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}

/* PHASE SELECTOR */
.phase-sel{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:11px}
.ps-btn{padding:8px 4px;border-radius:8px;border:1px solid var(--bd);background:var(--c2);cursor:pointer;text-align:center;transition:all .15s}
.ps-btn.on{background:var(--or2);border-color:var(--or)}
.ps-btn.auto{border-style:dashed}
.ps-name{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;text-transform:uppercase;color:var(--or)}
.ps-pct{font-size:9px;color:var(--gy);margin-top:1px}

/* DAY CARDS */
.dc{background:var(--c2);border:1px solid var(--bd);border-radius:var(--r);padding:11px;cursor:pointer}
.dc.sel{background:var(--or2);border-color:var(--or)}
.dcl{font-size:9px;font-weight:700;color:var(--or);letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.dcn{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;text-transform:uppercase}

/* SESS DETAIL */
.sd{background:var(--c1);border:1px solid var(--or2);border-left:3px solid var(--or);border-radius:var(--r);padding:12px;margin-bottom:9px}
.sdt{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:var(--or);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.etbl{width:100%;border-collapse:collapse;font-size:11px}
.eth{font-size:8.5px;font-weight:700;color:var(--gy);letter-spacing:.4px;text-transform:uppercase;padding:0 0 6px;text-align:left}
.eth:nth-child(2),.eth:nth-child(3){text-align:right}
.etr{border-top:1px solid var(--bd)}
.etd{padding:7px 0;vertical-align:top}
.etd:nth-child(2),.etd:nth-child(3){text-align:right}
.enm{font-size:11px;font-weight:600}
.esb{font-size:9px;color:var(--gy);margin-top:1px}
.esr{font-size:11px;font-weight:700;color:var(--am)}
.ert{font-size:10px;color:var(--or)}

/* 1RM DISPLAY CARD */
.rm-card{background:var(--c2);border:1px solid var(--or2);border-radius:var(--r);padding:12px;margin:10px 0;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.rm-lbl{font-size:10px;color:var(--gy);text-align:center;margin-bottom:3px}
.rm-val{font-size:15px;font-weight:700;text-align:center}
.rm-pct{font-size:20px;font-weight:900;color:var(--am)}
.rm-charge{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;color:var(--or)}

/* SET COUNTER */
.sets-wrap{display:flex;gap:7px;justify-content:center;margin:16px 0}
.set-sq{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;flex-shrink:0;transition:all .2s}
.set-sq.dn{background:var(--or);color:#fff}
.set-sq.cur{background:transparent;border:2px solid var(--or);color:var(--or)}
.set-sq.rem{background:var(--c3);color:var(--gy2)}

/* TEMPO COACH */
.tempo-ref{background:var(--c3);border-radius:8px;padding:9px 12px;margin:8px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tempo-anim{background:var(--c1);border:1px solid var(--or2);border-radius:12px;padding:20px;margin:10px 0;text-align:center}
.tempo-phase{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;margin-bottom:8px}
.tempo-cnt{font-size:72px;font-weight:900;font-family:'Barlow Condensed',sans-serif;line-height:1;color:var(--or)}
.tempo-bar{height:6px;border-radius:3px;background:var(--c3);overflow:hidden;margin-top:12px}
.tempo-bf{height:100%;border-radius:3px;background:var(--or);transition:width 1s linear}

/* RECORDS */
.rec{background:var(--c2);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:8px}
.rec-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
.rec-nm{font-size:9px;font-weight:700;color:var(--gy);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.rec-ov{text-align:right;font-size:9px;color:var(--gy)}
.rec-v{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;color:var(--or);line-height:1;margin:2px 0}
.rec-p{font-size:10px;font-weight:700;color:var(--gr)}
.rec-d{font-size:9px;color:var(--gy);margin-bottom:4px}
.rec-row{display:flex;gap:6px;margin-top:6px}
.rec-inp{flex:1;background:var(--c1);border:1px solid var(--bd);border-radius:7px;color:var(--wh);font-size:13px;font-family:'Barlow',sans-serif;padding:8px 10px;outline:none;margin:0}
.rec-inp:focus{border-color:var(--or)}
.rec-plus{width:36px;height:36px;border-radius:7px;background:var(--or);border:none;color:#fff;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rec-plus:active{opacity:.8}
.rv{margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}
.rv-h{display:flex;justify-content:space-between;align-items:center;font-size:8.5px;font-weight:700;color:var(--gy);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.bav{background:transparent;border:1px solid var(--or2);color:var(--or);border-radius:5px;padding:3px 8px;font-size:9px;font-weight:700;letter-spacing:.3px;cursor:pointer}
.vf{background:var(--c1);border:1px solid var(--or2);border-radius:9px;padding:11px;margin-bottom:7px}
.vd{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--bd)}
.vd:last-child{border-bottom:none}
.vpl{width:28px;height:28px;border-radius:50%;background:var(--c3);border:none;color:var(--or);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none}
.vem{font-size:10px;color:var(--gy2);text-align:center;padding:5px 0}

/* GRAPHIQUES */
.mv-f{display:flex;gap:4px;overflow-x:auto;padding-bottom:3px;margin-bottom:6px;scrollbar-width:none}
.mv-f::-webkit-scrollbar{display:none}
.mfb{padding:6px 11px;border-radius:17px;border:1px solid var(--bd);background:transparent;color:var(--gy);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Barlow',sans-serif}
.mfb.on{background:var(--or);border-color:var(--or);color:#fff}
.tf{display:flex;gap:5px;margin-bottom:10px}
.tfb{flex:1;padding:7px 3px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--gy);font-size:10px;font-weight:700;cursor:pointer;text-align:center;font-family:'Barlow',sans-serif}
.tfb.on{background:var(--or);border-color:var(--or);color:#fff}
.gv-tabs{display:flex;gap:5px;margin-bottom:10px}
.gvt{flex:1;padding:9px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--gy);font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:'Barlow',sans-serif}
.gvt.on{background:var(--or);border-color:var(--or);color:#fff}
.obj-bx{background:var(--gr2);border:1px solid var(--gr);border-radius:8px;padding:8px 10px;margin-bottom:8px}
.ch-w{position:relative;height:185px;margin:7px 0}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mc{background:var(--c2);border:1px solid var(--bd);border-radius:8px;padding:10px;cursor:pointer}
.mc-h{display:flex;align-items:center;font-size:9.5px;font-weight:700;margin-bottom:6px}
.mc-p{margin-left:auto;font-size:10px;font-weight:700;color:var(--or)}

/* COMPARE */
.cmp-row{display:flex;align-items:center;gap:0;background:var(--c2);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;margin-bottom:7px}
.cmp-ico{font-size:16px;margin-right:8px;flex-shrink:0}
.cmp-nm{font-size:10px;font-weight:700;flex:1}
.cmp-vals{display:flex;gap:10px;align-items:center}
.cmp-v{text-align:center;min-width:50px}
.cmp-vn{font-size:15px;font-weight:900}
.cmp-vl{font-size:8.5px;color:var(--gy);text-transform:uppercase;letter-spacing:.3px}
.cmp-delta{background:var(--or2);border:1px solid var(--or);border-radius:5px;padding:3px 8px;font-size:11px;font-weight:800;color:var(--or);flex-shrink:0}
.cmp-delta.pos{background:var(--gr2);border-color:var(--gr);color:var(--gr)}
.cmp-delta.neg{background:rgba(224,80,80,.15);border-color:#E05050;color:#E05050}

/* NUTRITION */
.kc{font-family:'Barlow Condensed',sans-serif;font-size:50px;font-weight:900;color:var(--wh);letter-spacing:-1px;text-align:center;line-height:1}
.mac-g{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.mac-c{background:var(--c2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 8px}
.mi{font-size:17px;margin-bottom:4px}
.mn{font-size:8.5px;font-weight:700;color:var(--or);letter-spacing:.4px;text-transform:uppercase}
.mv{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;line-height:1.1}
.mk{font-size:8.5px;color:var(--or);margin-bottom:2px}
.mp{font-size:8.5px;color:var(--gy);margin-bottom:4px}
.mf{font-size:8.5px;color:var(--gy);line-height:1.7;border-top:1px solid var(--bd);padding-top:4px}
.mr{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.mr:last-child{border-bottom:none}
.mt{flex-shrink:0;width:68px}
.mtt{font-size:8px;color:var(--gy);letter-spacing:.3px}
.mtb{font-size:9.5px;font-weight:700;color:var(--am)}
.md{font-size:10.5px;color:var(--gy);line-height:1.5}
.ml{border-left:2px solid var(--or);padding-left:6px}
.ml.am{border-left-color:var(--am)}
.ml.gr{border-left-color:var(--gr)}

/* PLUS / SUPPS */
.t2s{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.t2b{padding:9px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--gy);font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:'Barlow',sans-serif}
.t2b.on{background:var(--or);border-color:var(--or);color:#fff}
.tr-r{display:flex;align-items:center;gap:6px;margin:12px 0 6px}
.trb{background:var(--c3);border:1px solid var(--bd);border-radius:4px;padding:2px 7px;font-size:8.5px;font-weight:700}
.trd{font-size:9.5px;color:var(--gy)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.scc{background:var(--c2);border:1px solid var(--bd);border-radius:var(--r);padding:10px}
.sn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:var(--or);text-transform:uppercase;letter-spacing:.3px}
.sd2{font-size:16px;font-weight:900;line-height:1.1}
.sw{font-size:9px;color:var(--gy);margin-bottom:4px}
.ss{height:1px;background:var(--bd);margin:4px 0}
.sy{font-size:8.5px;color:var(--gy)}

/* BILAN */
.bilan-card{background:var(--c2);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:8px}
.bilan-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)}
.bilan-row:last-child{border-bottom:none}
.bilan-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* COMP MODE */
.comp-info{background:var(--bl2);border:1px solid var(--bl);border-radius:var(--r);padding:12px;margin-bottom:8px}
.comp-days{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--bl)}

/* PHASE SECTION (roadmap) */
.ph-s{border-left:3px solid var(--or);padding-left:10px;margin-bottom:12px}
.ph-s.p2{border-left-color:var(--am)}
.ph-h{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}
.ph-h span{color:var(--or)}
.ph-s.p2 .ph-h span{color:var(--am)}
.ph-p{font-size:8.5px;color:var(--gy);margin-bottom:7px}
.mo-r{padding:6px 0;border-bottom:1px solid var(--bd)}
.mo-r:last-child{border-bottom:none}
.mo-t{display:inline-block;background:var(--c3);border-radius:3px;padding:2px 6px;font-size:8px;font-weight:700;color:var(--or);letter-spacing:.3px;margin-bottom:2px;text-transform:uppercase}
.mo-d{font-size:10px;color:var(--gy);margin-bottom:3px}
.mo-b{display:flex;gap:4px;flex-wrap:wrap}
.mob{background:var(--c3);border:1px solid var(--bd);border-radius:4px;padding:2px 6px;font-size:8.5px;color:var(--wh)}

/* TIMELINE */
.tl{padding-left:17px;position:relative}
.tl::before{content:'';position:absolute;left:5px;top:9px;bottom:0;width:1.5px;background:var(--c3)}
.tli{position:relative;margin-bottom:7px}
.tl-d{position:absolute;left:-17px;top:11px;width:11px;height:11px;border-radius:50%;border:2px solid var(--or);background:var(--bg)}
.tli.dn .tl-d{background:var(--or)}
.tl-c{background:var(--c2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px}
.tl-j{font-size:8.5px;font-weight:700;color:var(--or);letter-spacing:.3px;text-transform:uppercase;margin-bottom:1px}

/* TOAST */
#toast{position:fixed;top:0;left:0;right:0;background:var(--or);color:#fff;font-weight:700;font-size:12px;padding:46px 14px 11px;text-align:center;z-index:300;transform:translateY(-100%);transition:transform .25s;font-family:'Barlow',sans-serif;pointer-events:none}
#toast.on{transform:translateY(0)}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:flex-end;justify-content:center}
#modal.on{display:flex}
.mb{background:var(--c2);border-radius:18px 18px 0 0;padding:18px 14px 30px;width:100%;max-width:480px}
.mm{font-size:14px;font-weight:600;text-align:center;margin-bottom:14px;line-height:1.5;color:var(--wh)}
.mbs{display:grid;grid-template-columns:1fr 1fr;gap:7px}

/* OVERLOAD PREDICTION */
.pred-card{background:var(--gr2);border:1px solid var(--gr);border-radius:var(--r);padding:12px;margin-bottom:8px}
.pred-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(61,186,111,.2)}
.pred-row:last-child{border-bottom:none}

/* LIVE OVERLAY */
#live{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column}
#live.on{display:flex}
.lv-hdr{padding:46px 13px 10px;background:var(--c1);border-bottom:1px solid var(--bd);flex-shrink:0}
.lv-body{flex:1;overflow-y:auto;padding:14px 13px 20px}
.mv-big{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;text-transform:uppercase;line-height:1;margin-bottom:3px}
.mv-det{font-size:14px;color:var(--gy);margin-bottom:10px}
.lsi{background:var(--c2);border:1px solid var(--bd);border-radius:10px;color:var(--wh);font-size:20px;font-weight:700;font-family:'Barlow',sans-serif;padding:12px;width:100%;text-align:center;outline:none;margin-bottom:9px}
.lsi:focus{border-color:var(--or)}
.rt-w{display:flex;justify-content:center;padding:14px 0 5px;position:relative}

function ld(){

  if(!S.cfg)S.cfg={rm_traction:0,rm_dips:0,rm_squat:0,rm_muscleup:0,bw:75,cs:tod(),mp:null,compDate:''};
  if(!S.hist)S.hist=[];
  if(!S.rmh)S.rmh={};
  if(!S.vids)S.vids={};
}

function tod(){return new Date().toISOString().split('T')[0];}
function fmt(d){try{return new Intl.DateTimeFormat('fr-FR',{day:'2-digit',month:'short'}).format(new Date(d));}catch(e){return d;}}
function fmtFull(d){try{return new Intl.DateTimeFormat('fr-FR',{day:'numeric',month:'long',year:'numeric'}).format(new Date(d));}catch(e){return d;}}

// ═══ UI HELPERS ═══
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}
function askModal(msg,cb,yLbl){
  document.getElementById('mm').textContent=msg;

function updHdr(){const yr=new Date().getFullYear();const n=S.hist.filter(h=>new Date(h.date).getFullYear()===yr).length;const el=document.getElementById('hdr-n');if(el)el.textContent=n;}

// ═══ CYCLE & PHASE ═══
function ci(){
  const st=new Date((S.cfg.cs||tod())+'T00:00:00');
  const now=new Date();now.setHours(0,0,0,0);
  const d=Math.max(0,Math.floor((now-st)/86400000));
  return{pi:Math.floor((d%40)/10),cd:(d%10)+1,md:(d%40)+1};
}
function getPI(){return S.cfg.mp!=null?S.cfg.mp:ci().pi;}
function calcLoad(pct,rmk){
  if(!pct||!rmk)return null;
  const v=S.cfg[rmk]||0;if(!v)return null;
  return Math.round(v*pct/1.25)*1.25;
}

// ═══ COMPETITION MODE ═══
function getCompInfo(){
  if(!S.cfg.compDate)return null;
  try{
    const comp=new Date(S.cfg.compDate+'T00:00:00');
    const now=new Date();now.setHours(0,0,0,0);
    const days=Math.ceil((comp-now)/86400000);
    if(days<0)return null;
    // Ideal: Force phase day 28 = comp - 7 days
    // cycle_start = comp - 35 days
    const idealLast=new Date(comp.getTime()-35*86400000);
    const dToLast=Math.floor((idealLast-now)/86400000);
    const cycles=Math.max(1,Math.floor(dToLast/40)+1);
    const recStart=new Date(idealLast.getTime()-Math.max(0,cycles-1)*40*86400000);
    const peakDate=new Date(comp.getTime()-7*86400000);
    return{days,cycles,recStart:recStart.toISOString().split('T')[0],peakDate:peakDate.toISOString().split('T')[0],compDate:S.cfg.compDate};
  }catch(e){return null;}
}

// ═══ BILAN 7 JOURS ═══
function getBilan(){
  const now=new Date();now.setHours(23,59,59,999);
  const past=new Date(now.getTime()-7*86400000);
  const recent=S.hist.filter(h=>new Date(h.date)>=past&&new Date(h.date)<=now);
  const allSessIds=['traction','dips','squat','muscleup','squat2'];
  const done=allSessIds.map(id=>({id,done:recent.some(h=>h.id===id),entry:recent.find(h=>h.id===id)}));
  return{recent,done,total:recent.length,sets:recent.reduce((a,h)=>a+(h.sets||0),0)};
}

// ═══ CYCLE COMPARISON ═══
function getCycleComp(){
  const st=new Date((S.cfg.cs||tod())+'T00:00:00');
  const now=new Date();now.setHours(23,59,59,999);
  const d=Math.max(0,Math.floor((now-st)/86400000));
  const cNum=Math.floor(d/40);
  const curSt=new Date(st.getTime()+cNum*40*86400000);
  const prevSt=new Date(st.getTime()+(cNum-1)*40*86400000);
  const prevEn=new Date(curSt.getTime()-1);
  return RECS.map(r=>{
    const h=S.rmh[r.id]||[];
    const cur=h.filter(p=>new Date(p.date)>=curSt&&new Date(p.date)<=now);
    const prev=h.filter(p=>new Date(p.date)>=prevSt&&new Date(p.date)<curSt);
    const cb=cur.length?Math.max(...cur.map(p=>p.value)):null;
    const pb=prev.length?Math.max(...prev.map(p=>p.value)):null;
    const delta=cb!=null&&pb!=null?Math.round((cb-pb)*10)/10:null;
    return{...r,cur:cb,prev:pb,delta};
  });
}

// ═══ OVERLOAD PREDICTION ═══
function calcPrediction(pi){
  if(!lv||!lv.loads||!lv.loads.length)return[];
  const preds=[];
  lv.loads.forEach(l=>{
    if(!l.loads.length)return;
    const avg=l.loads.reduce((a,b)=>a+b,0)/l.loads.length;
    const sess=SESS.find(s=>s.id===l.sessId);
    if(!sess)return;
    const sp=sess.ph[pi];
    const recommended=calcLoad(sp.pct,sess.rm)||0;
    const increase=recommended>0?Math.round(recommended*0.025/1.25)*1.25:1.25;
    const next=avg>=recommended?avg+increase:avg;
    preds.push({name:sess.name,current:avg,recommended,next:Math.round(next/1.25)*1.25});
  });
  return preds;
}

  const sc=document.getElementById('screen');sc.innerHTML='';sc.scrollTop=0;

    +'<div class="pb" style="margin-bottom:10px"><div class="pbf" style="width:'+pct+'%;background:'+ph.col+'"></div></div>'
    +sessHtml;
}

function buildChrono(el){
  const elapsed=cs.running?(Date.now()-cs.start+cs.elapsed):cs.elapsed;
  const secs=Math.floor(elapsed/1000);
  const mins=Math.floor(secs/60);
  const h=Math.floor(mins/60);
  const mm=String(mins%60).padStart(2,'0');
  const ss=String(secs%60).padStart(2,'0');
  const display=(h>0?h+':':'')+mm+':'+ss;
  const presets=[30,60,90,120,180,240,300];
  let pBtns='';
  presets.forEach(function(s){
    pBtns+='<button onclick="startRP('+s+')" style="padding:10px 8px;border-radius:9px;border:1px solid var(--bd);background:var(--c2);color:var(--wh);font-size:11px;font-weight:700;font-family:Barlow,sans-serif;cursor:pointer;flex:1;min-width:44px">'+(s>=60?Math.floor(s/60)+'min':s+'s')+'</button>';
  });
  el.innerHTML='<div style="text-align:center;padding:20px 0 12px">'
    +'<div id="chrono-d" style="font-family:\'Barlow Condensed\',sans-serif;font-size:78px;font-weight:900;color:var(--or);line-height:1;letter-spacing:-2px">'+display+'</div>'
    +'<div style="font-size:10px;color:var(--gy);margin-top:4px">Chronomètre</div></div>'
    +'<div style="display:flex;gap:8px;margin-bottom:18px">'
    +'<button class="btn '+(cs.running?'bdk':'bgr')+'" onclick="csToggle()">'+(cs.running?'⏸ Pause':'▶ Démarrer')+'</button>'
    +'<button class="btn bdk" style="width:auto;padding:13px 18px" onclick="csReset()">↺</button></div>'
    +'<div class="sl">TIMERS REPOS</div>'
    +'<div style="display:flex;gap:5px;flex-wrap:wrap">'+pBtns+'</div>'
    +'<div id="rest-area" style="margin-top:12px"></div>';
  if(cs.running) setTimeout(function(){const e2=document.getElementById('home-content');if(e2&&homeTab==='chrono')buildChrono(e2);},500);
}

function csToggle(){
  if(cs.running){cs.elapsed=Date.now()-cs.start+cs.elapsed;cs.running=false;}
  else{cs.start=Date.now();cs.running=true;}
  rHomeContent();
}
function csReset(){cs.running=false;cs.elapsed=0;cs.start=null;rHomeContent();}

function startRP(sec){
  if(restPTmr){clearInterval(restPTmr);restPTmr=null;}
  let rem=sec;
  function tick(){
    const a=document.getElementById('rest-area');if(!a){clearInterval(restPTmr);restPTmr=null;return;}
    const p=rem/sec;const r=44;const c=2*Math.PI*r;
    const col=rem<=10?'#E05050':'var(--or)';
    a.innerHTML='<div style="display:flex;align-items:center;gap:12px;background:var(--c2);border:1px solid var(--bd);border-radius:12px;padding:11px 13px">'
      +'<div style="position:relative;flex-shrink:0">'
      +'<svg width="90" height="90" viewBox="0 0 90 90">'
      +'<circle cx="45" cy="45" r="'+r+'" fill="none" stroke="var(--c3)" stroke-width="6"/>'
      +'<circle cx="45" cy="45" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="6" stroke-dasharray="'+c+'" stroke-dashoffset="'+(c*(1-p))+'" stroke-linecap="round" transform="rotate(-90 45 45)"/>'
      +'</svg>'
      +'<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:\'Barlow Condensed\',sans-serif;font-size:24px;font-weight:900;color:'+col+'">'+rem+'s</div>'
      +'</div>'
      +'<div style="flex:1">'
      +'<div style="font-size:10px;color:var(--gy);margin-bottom:3px">REPOS EN COURS</div>'
      +'<div style="font-size:11px;font-weight:700;color:var(--wh)">'+sec+'s</div>'
      +'<button onclick="if(restPTmr){clearInterval(restPTmr);restPTmr=null;}document.getElementById(\'rest-area\').innerHTML=\'\'" style="background:none;border:none;color:var(--gy);font-size:10px;cursor:pointer;margin-top:5px;font-family:Barlow,sans-serif">Arrêter</button>'
      +'</div></div>';
    if(rem<=0){
      clearInterval(restPTmr);restPTmr=null;
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      toast('Repos terminé — prêt !');
      setTimeout(function(){const a2=document.getElementById('rest-area');if(a2)a2.innerHTML='';},1200);
    }
    rem--;
  }
  tick();restPTmr=setInterval(tick,1000);
}

function buildProgramme(el){
  const pi=getPI();const ph=CP[pi];
  let html='';
  SESS.forEach(function(s){
    const sp=s.ph[pi];
    const load=calcLoad(sp.pct,s.rm);
    const rmVal=S.cfg[s.rm]||0;
    let rows='<tr class="etr"><td class="etd"><div class="enm" style="color:'+s.col+'">'+s.name+'</div>'
      +'<div class="esb">'+(load?'+'+load+' kg ('+(((sp.pct||0)*100)|0)+'% de '+rmVal+'kg)':sp.note)+'</div></td>'
      +'<td class="etd"><div class="esr">'+sp.sets+'x'+sp.reps+'</div></td>'
      +'<td class="etd"><div class="ert">'+(sp.rest>=60?Math.round(sp.rest/60)+'min':sp.rest+'s')+'</div></td></tr>';
    s.grp.forEach(function(g){
      g.ex.forEach(function(ex){
        const nm=ex[0],vs=ex[1],rs=ex[2];

    });

      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      +'<div class="sdt" style="color:'+s.col+';margin-bottom:0">'+s.name+'</div>'
      +'<div style="font-size:9px;color:var(--gy);background:var(--c3);padding:3px 8px;border-radius:5px">J'+s.day+' / 10</div>'
      +'</div>'
      +(load?'<div style="background:var(--c3);border-radius:6px;padding:7px 10px;margin-bottom:8px;display:flex;gap:10px;align-items:center">'
        +'<div style="font-size:8.5px;color:var(--gy)">1RM '+rmVal+'kg</div>'
        +'<div style="font-size:8.5px;color:var(--gy)">×</div>'
        +'<div style="font-size:12px;font-weight:900;color:var(--am)">'+(((sp.pct||0)*100)|0)+'%</div>'
        +'<div style="font-size:8.5px;color:var(--gy)">=</div>'
        +'<div style="font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:900;color:var(--or)">+'+load+' kg</div>'
        +'<button class="btn bor" style="padding:7px 12px;font-size:11px;width:auto;margin:0 0 0 auto" onclick="startFromId(\''+s.id+'\')" >⚡</button>'

      +'<tbody>'+rows+'</tbody></table>'
      +'</div>';
  });
  el.innerHTML='<div class="sl">CYCLE COMPLET — '+ph.name.toUpperCase()+' · '+((ph.ri[0]*100)|0)+'–'+((ph.ri[1]*100)|0)+'% 1RM</div>'+html;

// ═══════════════════════ PROGRESSION ═══════════════════════
function rProg(){
  const pi=getPI();const{md}=ci();
  const yr=new Date().getFullYear();
  const tot=S.hist.length;const ytot=S.hist.filter(h=>new Date(h.date).getFullYear()===yr).length;
  const pct=Math.round(md/40*100);
  let recs='';
  RECS.forEach(r=>{
    const h=S.rmh[r.id]||[];const last=h.length?h[h.length-1]:null;
    const val=last?last.value:(r.rmk?S.cfg[r.rmk]||0:0);
    const p=r.obj>0?Math.min(100,Math.round(val/r.obj*100)):0;
    const vids=S.vids[r.id]||[];
    const vHtml=vids.length?vids.map(v=>`<div class="vd"><a href="${v.url}" target="_blank" class="vpl"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></a><div style="flex:1"><div style="font-size:11px;font-weight:600">${v.title}</div><div style="font-size:8.5px;color:var(--gy)">${fmt(v.date)}</div></div><button onclick="delVid('${r.id}','${v.id}')" style="background:none;border:none;color:var(--gy2);cursor:pointer;font-size:12px;padding:0 3px">✕</button></div>`).join(''):'<div class="vem">Aucune vidéo — ajoute ta première perf !</div>';
    const isVF=vidFormId===r.id;
    recs+=`<div class="rec"><div class="rec-top"><div class="rec-nm">${r.ico} ${r.lbl}</div><div class="rec-ov"><div style="font-size:8px;color:var(--gy)">OBJECTIF</div><div>${r.obj} ${r.unit}</div></div></div>
      <div class="rec-v">${val} <span style="font-size:14px;color:var(--gy);font-weight:400">${r.unit}</span></div>
      <div class="rec-p">${p}% atteint</div>
      ${last?'<div class="rec-d">Dernier : '+val+' '+r.unit+' — '+fmt(last.date)+'</div>':''}
      <div class="pb"><div class="pbf" style="width:${p}%"></div></div>
      <div class="rec-row"><input class="rec-inp" type="number" id="ri-${r.id}" placeholder="Nouveau record (${r.unit})"><button class="rec-plus" onclick="saveRec('${r.id}')">+</button></div>
      <div class="rv"><div class="rv-h"><span>📽 VIDÉOS (${vids.length})</span><button class="bav" onclick="toggleVidForm('${r.id}')">+ AJOUTER</button></div>
      ${isVF?`<div class="vf"><div style="margin-bottom:7px"><label>Titre</label><input type="text" id="vt-${r.id}" placeholder="Ex: PR pull-up +22kg" style="margin-bottom:0"></div><div style="margin-top:7px;margin-bottom:7px"><label>Lien (YouTube, Drive…)</label><input type="url" id="vu-${r.id}" placeholder="https://" style="margin-bottom:0"></div><button class="btn bor" style="margin-top:7px" onclick="saveVid('${r.id}')">Enregistrer</button></div>`:''}
      ${vHtml}</div></div>`;
  });
  document.getElementById('screen').innerHTML=`<div class="pg">
    <div class="g3"><div class="stc"><div class="stv">${tot}</div><div class="stl">Total</div></div><div class="stc"><div class="stv">${ytot}</div><div class="stl">${yr}</div></div><div class="stc"><div class="stv" style="color:var(--or)">${pct}%</div><div class="stl">Phase</div></div></div>
    <div class="sl">Records — vidéos & perfs</div>${recs}</div>`;
}

function toggleVidForm(id){vidFormId=vidFormId===id?null:id;rProg();}
function saveRec(id){
  const inp=document.getElementById('ri-'+id);if(!inp)return;
  const v=parseFloat(inp.value);if(!v||v<=0){toast('Entre une valeur valide');return;}
  if(!S.rmh[id])S.rmh[id]=[];S.rmh[id].push({date:tod(),value:v});
  const r=RECS.find(x=>x.id===id);if(r&&r.rmk)S.cfg[r.rmk]=v;
  sv();toast('Record : '+v+' '+(r?r.unit:''));rProg();
}
function saveVid(id){
  const t=document.getElementById('vt-'+id);const u=document.getElementById('vu-'+id);
  if(!t||!u){toast('Erreur');return;}
  const title=t.value.trim();const url=u.value.trim();
  if(!title||!url){toast('Remplis titre et lien');return;}
  if(!S.vids[id])S.vids[id]=[];S.vids[id].push({id:Date.now()+'',date:tod(),title,url});
  vidFormId=null;sv();toast('Vidéo ajoutée');rProg();
}
function delVid(id,vid){
  askModal('Supprimer cette vidéo ?',()=>{S.vids[id]=(S.vids[id]||[]).filter(v=>v.id!==vid);sv();rProg();});
}

// ═══════════════════════ GRAPHIQUES ═══════════════════════
function rGfx(){
  const movBtns=RECS.map(r=>`<button class="mfb${movF===r.id?' on':''}" onclick="setMov('${r.id}')">${r.ico} ${r.lbl}</button>`).join('');
  const timeBtns=[['7d','7J'],['1m','1M'],['1y','1A'],['all','TOUT']].map(([v,l])=>`<button class="tfb${timeF===v?' on':''}" onclick="setTF('${v}')">${l}</button>`).join('');
  const viewTabs=`<button class="gvt${gfxV==='prog'?' on':''}" onclick="setGV('prog')">📈 Progression</button><button class="gvt${gfxV==='cmp'?' on':''}" onclick="setGV('cmp')">⚡ Cycle vs Cycle</button>`;

  if(gfxV==='cmp'){
    const cmp=getCycleComp();
    const rows=cmp.map(r=>{
      const dClass=r.delta>0?'pos':r.delta<0?'neg':'';
      const dStr=r.delta!=null?(r.delta>0?'+':'')+r.delta+' '+r.unit:'—';
      return`<div class="cmp-row">
        <span class="cmp-ico">${r.ico}</span>
        <div class="cmp-nm">${r.lbl}</div>
        <div class="cmp-vals">
          <div class="cmp-v"><div class="cmp-vn" style="color:var(--gy)">${r.prev!=null?r.prev+'':' —'}</div><div class="cmp-vl">Cycle -1</div></div>
          <div class="cmp-v"><div class="cmp-vn" style="color:var(--or)">${r.cur!=null?r.cur+'':'—'}</div><div class="cmp-vl">Ce cycle</div></div>
          <div class="cmp-delta ${dClass}">${dStr}</div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('screen').innerHTML=`<div class="pg">
      <div class="gv-tabs">${viewTabs}</div>
      <div class="sl">Ce cycle vs cycle précédent</div>
      ${rows||'<div style="color:var(--gy);font-size:12px;text-align:center;padding:30px">Pas encore assez de données — entre tes records dans Progression pour voir apparaître la comparaison</div>'}
    </div>`;
    return;
  }

  const rec=RECS.find(r=>r.id===movF)||RECS[0];
  const hist=S.rmh[rec.id]||[];
  const cuts={'7d':7,'1m':30,'1y':365,'all':36500};
  const dcut=(cuts[timeF]||36500)*86400000;
  const filt=hist.filter(p=>Date.now()-new Date(p.date).getTime()<=dcut);
  const lastV=filt.length?filt[filt.length-1].value:(rec.rmk?S.cfg[rec.rmk]||0:0);
  let projH='';
  if(filt.length>=2){
    try{
      const f=filt[0],l=filt[filt.length-1];
      const dd=Math.max(1,(new Date(l.date)-new Date(f.date))/86400000);
      const rate=(l.value-f.value)/dd;
      if(rate>0&&l.value<rec.obj){
        const left=Math.ceil((rec.obj-l.value)/rate);
        projH=`<div class="obj-bx"><div style="font-size:11px;font-weight:600;color:var(--gr)">🎯 Objectif dans ${left} jours — ${fmtFull(new Date(Date.now()+left*86400000).toISOString().split('T')[0])}</div><div style="font-size:9.5px;color:var(--gy);margin-top:2px">📈 Vitesse : +${rate.toFixed(3)} ${rec.unit}/jour</div></div>`;
      }
    }catch(e){}
  }
  const mcards=RECS.map(r=>{
    const h=S.rmh[r.id]||[];const lv2=h.length?h[h.length-1].value:(r.rmk?S.cfg[r.rmk]||0:0);
    const p=r.obj>0?Math.min(100,Math.round(lv2/r.obj*100)):0;
    return`<div class="mc" onclick="setMov('${r.id}')"><div class="mc-h">${r.ico} ${r.lbl}<span class="mc-p">${p}%</span></div><div class="pb"><div class="pbf" style="width:${p}%"></div></div><div style="font-size:11px;color:var(--gy);margin-top:5px">Record : <strong style="color:var(--wh)">${lv2} ${r.unit}</strong></div></div>`;
  }).join('');

  document.getElementById('screen').innerHTML=`<div class="pg">
    <div class="gv-tabs">${viewTabs}</div>
    <div class="mv-f">${movBtns}</div>
    <div class="tf">${timeBtns}</div>
    <div class="card2">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
        <div><div style="font-size:9px;font-weight:700;color:var(--gy);letter-spacing:.5px;text-transform:uppercase">COURBE DE PROGRESSION</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900">${rec.ico} ${rec.lbl}</div></div>
        <div style="text-align:right"><div style="font-size:8.5px;color:var(--gy);text-transform:uppercase;letter-spacing:.3px">RECORD</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:var(--or);line-height:1">${lastV} <span style="font-size:12px;color:var(--gy);font-weight:400">${rec.unit}</span></div><div style="font-size:8.5px;color:var(--gy)">Obj: ${rec.obj} ${rec.unit}</div></div>
      </div>
      ${projH}<div class="ch-w"><canvas id="gch"></canvas></div>
    </div>
    <div class="sl">Toutes les métriques</div>
    <div class="mg">${mcards}</div>
  </div>`;

  const cvs=document.getElementById('gch');if(!cvs)return;
  if(gChart){try{gChart.destroy();}catch(e){}gChart=null;}
  if(!filt.length){cvs.parentNode.innerHTML='<div style="height:185px;display:flex;align-items:center;justify-content:center;color:var(--gy2);font-size:11px;text-align:center">Aucune donnée<br>Entre ton premier record dans Progression</div>';return;}
  gChart=new Chart(cvs,{
    type:'line',
    data:{labels:filt.map(p=>fmt(p.date)),datasets:[
      {label:'Record',data:filt.map(p=>p.value),borderColor:'#E8732A',backgroundColor:'rgba(232,115,42,.1)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#E8732A',borderWidth:2.5},
      {label:'Objectif',data:Array(filt.length).fill(rec.obj),borderColor:'rgba(61,186,111,.4)',borderDash:[4,4],borderWidth:1.2,pointRadius:0,fill:false},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4A4438',font:{size:9,family:'Barlow'}},grid:{color:'rgba(255,180,80,.04)'}},y:{ticks:{color:'#4A4438',font:{size:9,family:'Barlow'},callback:v=>v+' '+rec.unit},grid:{color:'rgba(255,180,80,.04)'}}}}
  });
}

  const el=document.getElementById('ptc');if(!el)return;
  if(plusTab==='supps'){
    const sc=(arr,bc,nc)=>arr.map(s=>`<div class="scc" style="${bc?'border-color:'+bc:''}"><div class="sn" style="${nc?'color:'+nc:''}">${s.n}</div><div class="sd2">${s.d}</div><div class="sw">${s.w}</div><div class="ss"></div><div class="sy">${s.y}</div></div>`).join('');
    el.innerHTML=`
      <div class="tr-r"><span class="trb">TIER 1</span><span class="trd">Indispensables — ROI maximal</span></div>
      <div class="sg">${sc([{n:'CRÉATINE',d:'5g/j',w:'N\'importe quand',y:'Force +5–15%, récupération'},{n:'WHEY',d:'25–40g',w:'Post-training',y:'Synthèse protéique rapide'},{n:'CASÉINE',d:'30g',w:'Avant de dormir',y:'Anabolisme nocturne'},{n:'MAGNÉSIUM',d:'350mg',w:'Soir',y:'SNC + sommeil + récup'},{n:'D3 + K2',d:'4000 UI',w:'Matin repas gras',y:'Testo + immunité + os'}],'','')}</div>
      <div class="tr-r"><span class="trb" style="color:var(--am)">TIER 2</span><span class="trd">Fortement recommandés</span></div>
      <div class="sg">${sc([{n:'OMÉGA-3',d:'2–3g',w:'Au repas',y:'Anti-inflammatoire joints'},{n:'COLLAGÈNE',d:'10g',w:'Matin + Vit C',y:'Tendons / ligaments'},{n:'BÊTA-ALANINE',d:'3.2g/j',w:'Pré-training',y:'Endurance de force'},{n:'ZINC',d:'20mg',w:'Soir',y:'Testostérone + immunité'}],'rgba(212,168,16,.25)','var(--am)')}</div>
      <div class="tr-r"><span class="trb" style="color:var(--gy)">TIER 3</span><span class="trd">Optionnels / situationnels</span></div>
      <div class="sg">${sc([{n:'CAFÉINE',d:'200mg',w:'Pré-training',y:'Force + focus'},{n:'ASHWAGANDHA',d:'600mg',w:'Soir',y:'Cortisol + récup SNC'}],'rgba(122,112,96,.25)','var(--gy)')}</div>`;
  } else {
    const comp=getCompInfo();
    const bilan=getBilan();
    const compHtml=comp?`<div class="comp-info"><div style="font-size:9px;font-weight:700;color:var(--bl);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">MODE COMPÉTITION</div><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:5px"><div class="comp-days">${comp.days}</div><div style="font-size:13px;color:var(--gy)">jours restants</div></div><div style="font-size:10px;color:var(--gy);line-height:1.8">${comp.cycles} cycle${comp.cycles>1?'s':''} complets avant la compét<br>Pic de force recommandé : ${fmt(comp.peakDate)}<br>Départ idéal du prochain cycle : ${fmt(comp.recStart)}</div></div>`:'';
    const bilanRows=bilan.done.map(d=>{
      const s=SESS.find(x=>x.id===d.id);if(!s)return'';
      const col=d.done?'var(--gr)':'var(--gy2)';
      return`<div class="bilan-row"><div class="bilan-dot" style="background:${col}"></div><div style="flex:1;font-size:11px;font-weight:${d.done?'700':'400'};color:${d.done?'var(--wh)':'var(--gy2)'}">${s.name}</div>${d.done?`<div style="font-size:9px;color:var(--gy)">${fmt(d.entry.date)}</div>`:'<div style="font-size:9px;color:var(--gy2)">non fait</div>'}</div>`;
    }).join('');
    el.innerHTML=`
      <div class="sl">BILAN DES 7 DERNIERS JOURS</div>
      <div class="bilan-card">
        <div style="display:flex;gap:12px;margin-bottom:10px">
          <div class="stc" style="flex:1"><div class="stv" style="color:var(--or)">${bilan.total}</div><div class="stl">Séances</div></div>
          <div class="stc" style="flex:1"><div class="stv">${bilan.sets}</div><div class="stl">Séries totales</div></div>
        </div>
        ${bilanRows}
      </div>
      ${comp?'<div class="sl">MODE COMPÉTITION</div>'+compHtml:''}
      <div class="sl">RÉGLAGES DU PROGRAMME</div>
      <div class="card2">
        <div style="margin-bottom:7px"><label>Date de compétition (optionnel)</label><input type="date" id="st-comp" value="${S.cfg.compDate||''}" style="margin-bottom:0"></div>
        <div class="g2" style="margin-bottom:7px">
          ${[['rm_traction','Traction (kg lest)'],['rm_dips','Dips (kg lest)'],['rm_squat','Squat (kg lest)'],['rm_muscleup','Muscle-up (kg)']].map(([k,l])=>`<div><label>${l}</label><input type="number" id="st-${k}" value="${S.cfg[k]||0}" style="margin-bottom:0"></div>`).join('')}
        </div>
        <div style="margin-bottom:7px"><label>Poids de corps (kg)</label><input type="number" id="st-bw" value="${S.cfg.bw||75}" style="margin-bottom:0"></div>
        <div style="margin-bottom:10px"><label>Date de début du cycle actuel</label><input type="date" id="st-cs" value="${S.cfg.cs||tod()}" style="margin-bottom:0"></div>
        <button class="btn bor" onclick="saveCfg()">Enregistrer les réglages</button>
        <button class="btn bdk" style="margin-top:6px" onclick="exportD()">Exporter les données (JSON)</button>
      </div>
      <div class="ph-s">
        <div class="ph-h"><span>ARCHITECTURE</span> — Cycle de 10 jours</div>
        <div class="ph-p">5 séances · 96h entre Traction et Muscle-up · 96h entre Dips et Muscle-up</div>
        ${[['J1–J10','Volume — Accumulation musculaire',['4×8-10','65–70% 1RM','Contrôlé']],['J11–J20','Puissance — Recrutement SNC',['5×4-5','75–80% 1RM','EXPLOSIF']],['J21–J30','Force — Charges maximales',['5×2-4','85–92% 1RM','Max intention']],['J31–J40','Deload — Surcompensation',['3×5-6','50–60% 1RM','Technique seule']]].map(m=>`<div class="mo-r"><div class="mo-t">${m[0]}</div><div class="mo-d">${m[1]}</div><div class="mo-b">${m[2].map(b=>`<span class="mob">${b}</span>`).join('')}</div></div>`).join('')}
      </div>`;
  }
}
function saveCfg(){
  ['rm_traction','rm_dips','rm_squat','rm_muscleup'].forEach(k=>{const i=document.getElementById('st-'+k);if(i){const v=parseFloat(i.value);if(v>0)S.cfg[k]=v;}});
  const bw=document.getElementById('st-bw');if(bw){const v=parseFloat(bw.value);if(v>0)S.cfg.bw=v;}
  const cs=document.getElementById('st-cs');if(cs&&cs.value)S.cfg.cs=cs.value;
  const comp=document.getElementById('st-comp');if(comp)S.cfg.compDate=comp.value||'';
  sv();toast('Réglages enregistrés');rPlus();
}
function exportD(){
  try{const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='slp-'+tod()+'.json';a.click();}
  catch(e){toast('Export non disponible dans cette vue');}
}

// ═══════════════════════ J'AI SWATÉ ═══════════════════════
function onSwate(){
  const pi=getPI();const{cd}=ci();const sess=SESS.find(s=>s.day===cd);
  const name=sess?sess.name:'Séance libre';
  const id=sess?sess.id:'libre';
  const phase=sess?CP[pi].name:'Libre';
  // Check if already logged today
  if(S.hist.some(h=>h.date===tod()&&h.id===id)){toast('Séance déjà comptabilisée aujourd\'hui');return;}
  S.hist.push({date:tod(),name,id,phase,sets:0,duration:0});
  sv();updHdr();
  toast('Séance enregistrée 💪 ('+name+')');
}

// ═══════════════════════ LIVE SESSION ═══════════════════════
function startLive(sess,pi){
  const sp=sess.ph[pi];
  const exs=[];
  exs.push({main:true,name:sess.name,sets:sp.sets,reps:sp.reps,pct:sp.pct,load:calcLoad(sp.pct,sess.rm),note:sp.note,rest:sp.rest,col:sess.col,sessId:sess.id,cur:0,done:false,loads:[]});
  sess.grp.forEach(g=>{
    exs.push({hdr:true,lbl:g.lbl});
    g.ex.forEach(([nm,vs,rs])=>{const v=vs[pi];if(v==='—')return;exs.push({main:false,name:nm,vol:v,rest:rs[pi]||60,cur:0,done:false,loads:[]});});
  });
  lv={sess,pi,exs,idx:0,restOn:false,restSec:0,restTot:0,t0:Date.now(),nsets:0,mainLoads:[]};
  document.getElementById('live').classList.add('on');
  renderLive();
}

function renderLive(){
  if(!lv){document.getElementById('live').classList.remove('on');return;}
  while(lv.idx<lv.exs.length&&lv.exs[lv.idx].hdr) lv.idx++;
  if(lv.idx>=lv.exs.length){finishLive();return;}
  const ex=lv.exs[lv.idx];
  const dn=lv.exs.filter(e=>!e.hdr&&e.done).length;
  const tot=lv.exs.filter(e=>!e.hdr).length;
  document.getElementById('lv-prg').style.width=(tot?(dn/tot*100):0)+'%';
  document.getElementById('lv-info').textContent=lv.sess.name+' · '+CP[lv.pi].name+' · Ex '+dn+'/'+tot;

  const sets=ex.main?ex.sets:parseInt((ex.vol||'3').match(/\d+/)[0])||3;
  const ph=CP[lv.pi];

  // Build set counter
  let setsHtml='<div class="sets-wrap">';
  for(let i=0;i<sets;i++){
    const cls=i<ex.cur?'dn':i===ex.cur?'cur':'rem';
    setsHtml+=`<div class="set-sq ${cls}">${i<ex.cur?'✓':(i+1)}</div>`;
  }
  setsHtml+='</div>';
  setsHtml+=`<div style="text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;margin-bottom:10px;color:${ex.col||'var(--wh)'}">SÉRIE ${ex.cur+1} / ${sets}</div>`;

  let content='';
  if(lv.restOn){
    const p=lv.restSec/lv.restTot;const r=52;const c=2*Math.PI*r;
    content=`<div class="rt-w" style="height:130px">
      <svg width="130" height="130" viewBox="0 0 130 130" style="position:absolute">
        <circle cx="65" cy="65" r="${r}" fill="none" stroke="var(--c3)" stroke-width="7"/>
        <circle cx="65" cy="65" r="${r}" fill="none" stroke="var(--or)" stroke-width="7" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-p)}" stroke-linecap="round" transform="rotate(-90 65 65)" id="lr"/>
      </svg>
      <div class="rt-n" id="lt">${lv.restSec}s</div>
    </div>
    <div style="font-size:12px;color:var(--gy);text-align:center;margin-bottom:7px">Repos en cours…</div>
    <div style="text-align:center;font-size:10px;color:var(--gy);margin-bottom:16px">Prochaine série : ${ex.cur+1}/${sets}</div>
    <button class="btn bdk" onclick="skipRest()">Passer le repos</button>`;
  } else {
    let rmCard='';
    if(ex.main&&ex.load!=null){
      const rmVal=S.cfg[lv.sess.rm]||0;
      const pctVal=ex.pct?((ex.pct*100)|0):0;
      rmCard=`<div class="rm-card">
        <div style="text-align:center"><div class="rm-lbl">1RM ACTUEL</div><div class="rm-val">${rmVal} kg</div></div>
        <div style="font-size:24px;color:var(--gy)">×</div>
        <div style="text-align:center"><div class="rm-lbl">PHASE</div><div class="rm-pct">${pctVal}%</div></div>
        <div style="font-size:24px;color:var(--gy)">=</div>
        <div style="text-align:center"><div class="rm-lbl">CHARGE CIBLE</div><div class="rm-charge">+${ex.load} kg</div></div>
      </div>`;
    }
    content=`<div class="mv-big" style="color:${ex.main?(ex.col||'var(--or)'):'var(--wh)'}">${ex.name}</div>
    <div class="mv-det">${ex.main?sets+' séries · '+ex.reps+' reps':ex.vol}</div>
    ${setsHtml}
    ${rmCard}
    <div style="font-size:11px;color:var(--gy);font-style:italic;text-align:center;margin-bottom:14px">${ex.main?ex.note:''}</div>
    <label>Charge réalisée (kg)</label>
    <input class="lsi" type="number" id="dl" placeholder="${ex.main&&ex.load?ex.load+' kg':'Optionnel'}">
    <button class="btn bgr" onclick="doneSet()" style="margin-top:2px">Série ${ex.cur+1}/${sets} — Terminée ✓</button>
    <button class="btn bdk" style="margin-top:6px" onclick="skipEx()">Passer cet exercice</button>`;
  }

  const nxt=lv.exs.slice(lv.idx+1).filter(e=>!e.hdr&&!e.done).slice(0,2);
  const nxtH=!lv.restOn&&nxt.length?`<div style="margin-top:16px;padding-top:10px;border-top:1px solid var(--bd)"><div style="font-size:8.5px;font-weight:700;color:var(--gy);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px">SUITE</div>${nxt.map(e=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:11px;color:var(--gy)"><span>${e.name}</span><span style="color:var(--am)">${e.vol||''}</span></div>`).join('')}</div>`:'';
  document.getElementById('lv-body').innerHTML=content+nxtH;
}

function doneSet(){
  const ex=lv.exs[lv.idx];
  const sets=ex.main?ex.sets:parseInt((ex.vol||'3').match(/\d+/)[0])||3;
  const dl=document.getElementById('dl');
  const loadV=dl?parseFloat(dl.value)||null:null;
  if(loadV&&ex.main) lv.mainLoads.push({sessId:lv.sess.id,loads:(lv.mainLoads.find(l=>l.sessId===lv.sess.id)?.loads||[]).concat(loadV)});
  if(loadV) ex.loads.push(loadV);
  ex.cur++;lv.nsets++;
  if(ex.cur>=sets){ex.done=true;lv.idx++;while(lv.idx<lv.exs.length&&lv.exs[lv.idx].hdr)lv.idx++;if(lv.idx>=lv.exs.length){finishLive();return;}renderLive();return;}
  startRestTimer(ex.rest||60);
}
function skipEx(){lv.exs[lv.idx].done=true;lv.idx++;renderLive();}

function startRestTimer(sec){
  lv.restOn=true;lv.restSec=sec;lv.restTot=sec;renderLive();
  restTmr=setInterval(()=>{
    if(!lv){clearInterval(restTmr);restTmr=null;return;}
    lv.restSec--;
    const t=document.getElementById('lt');const r=document.getElementById('lr');
    if(t)t.textContent=lv.restSec+'s';
    if(r){const c=2*Math.PI*52;r.setAttribute('stroke-dashoffset',c*(1-lv.restSec/lv.restTot));}
    if(lv.restSec<=0){clearInterval(restTmr);restTmr=null;lv.restOn=false;toast('Repos terminé — prêt !');renderLive();}
  },1000);
}
function skipRest(){if(restTmr){clearInterval(restTmr);restTmr=null;}if(lv){lv.restOn=false;renderLive();}}
function abandonSess(){
  askModal('Abandonner la séance ?',()=>{
    if(restTmr){clearInterval(restTmr);restTmr=null;}
    lv=null;document.getElementById('live').classList.remove('on');
  });
}

function finishLive(){
  if(restTmr){clearInterval(restTmr);restTmr=null;}
  const pi=lv.pi;
  const preds=calcPrediction(pi);
  S.hist.push({date:tod(),name:lv.sess.name,id:lv.sess.id,phase:CP[pi].name,sets:lv.nsets,duration:Math.round((Date.now()-lv.t0)/60000)});
  sv();updHdr();
  const predHtml=preds.length?`<div class="pred-card"><div style="font-size:9px;font-weight:700;color:var(--gr);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">📊 PRÉVISION DE SURCHARGE</div>${preds.map(p=>`<div class="pred-row"><span style="font-size:11px;font-weight:600">${p.name}</span><div style="text-align:right"><div style="font-size:13px;font-weight:900;color:var(--gr)">+${p.next} kg</div><div style="font-size:9px;color:var(--gy)">prochaine séance</div></div></div>`).join('')}</div>`:'';
  lv=null;
  document.getElementById('lv-body').innerHTML=`<div style="text-align:center;padding:40px 14px">
    <div style="font-size:60px;margin-bottom:14px">💪</div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--or);text-transform:uppercase;margin-bottom:6px">Séance terminée !</div>
    <div style="color:var(--gy);font-size:12px;margin-bottom:20px">${S.hist[S.hist.length-1].name} · ${S.hist[S.hist.length-1].sets} séries · ${S.hist[S.hist.length-1].duration} min</div>
    ${predHtml}
    <button class="btn bor" style="margin-top:16px" onclick="document.getElementById('live').classList.remove('on')">Retour</button>
  </div>`;
  toast('Séance enregistrée 💪');
}

// ═══ INIT ═══
ld();updHdr();goTo(0);
</script>
</body>
</html>
